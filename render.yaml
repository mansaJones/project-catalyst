# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploys Project Catalyst as a static site (Vite build -> dist).
services:
  - type: web
    name: project-catalyst
    runtime: static
    # npm ci is reproducible from the lockfile; --include=dev ensures
    # tsc + vite (devDependencies) are present for the build step.
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    # SPA fallback — harmless now, ready if you add client-side routing later.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
