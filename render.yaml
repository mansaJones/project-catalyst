# Render Blueprint — https://render.com/docs/blueprint-spec
# Two services: a static React site + a Node API that holds the Anthropic key.
services:
  # ---- Frontend: static React site ----
  - type: web
    name: project-catalyst
    runtime: static
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_USE_LLM
        value: "true"
      # After the API service deploys, set this (Render prompts you) to its PUBLIC
      # url, e.g. https://project-catalyst-api.onrender.com — then redeploy this site.
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN

  # ---- Backend: Node web service that holds the Anthropic key ----
  - type: web
    name: project-catalyst-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: node server/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      # Comma-separate if you serve the frontend from more than one origin.
      - key: ALLOWED_ORIGIN
        value: https://project-catalyst.mansa-tech.com
      - key: RATE_LIMIT_PER_MIN
        value: "20"
